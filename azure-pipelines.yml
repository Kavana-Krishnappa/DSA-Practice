trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

steps:
# ✅ Build the project
- task: Maven@4
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'package'

# ✅ Publish the build artifact (the .jar in target folder)
- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(System.DefaultWorkingDirectory)/target'
    ArtifactName: 'drop'
    publishLocation: 'Container'
