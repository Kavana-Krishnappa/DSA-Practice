trigger:
  branches:
    include:
      - array   # your branch name

stages:
- stage: Build
  jobs:
  - job: BuildJob
    pool:
      vmImage: ubuntu-latest
    steps:
    # ✅ Step 1: Compile Java files
    - task: CmdLine@2
      displayName: "Compile Java files"
      inputs:
        script: |
          mkdir -p out
          javac -d out $(find . -name "*.java")

    # ✅ Step 2: Package into a JAR (optional, skip if you just want .class files)
    - task: CmdLine@2
      displayName: "Create JAR file"
      inputs:
        script: |
          jar cf out/app.jar -C out .

    # ✅ Step 3: Publish the build artifacts
    - task: PublishBuildArtifacts@1
      displayName: "Publish artifacts"
      inputs:
        PathtoPublish: "$(System.DefaultWorkingDirectory)/out"
        ArtifactName: "drop"
        publishLocation: "Container"
